<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sports Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #111113; --card: #1a1a1d; --border: #252528;
      --text: #f2f2f4; --muted: #52525a; --dim: #2e2e33;
      --live: #e8414a; --accent: #3b82f6;
    }
    html {
      background: var(--bg);
      scrollbar-gutter: stable;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Franklin Gothic Medium','Franklin Gothic','ITC Franklin Gothic','Arial Narrow',sans-serif;
      max-width: 100%; margin: 0 auto; min-height: 100vh; overflow-x: hidden;
    }
    @media (min-width: 640px) {
      body { max-width: 900px; }
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ── TABS ── */
    .tabs { display: flex; padding: 20px 20px 0; border-bottom: 1px solid var(--border); position: relative; }
    .tab { padding: 10px 18px 12px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; color: var(--muted); letter-spacing: 0.4px; transition: color .2s; }
    .tab.active { color: var(--text); }
    .tab-indicator {
      position: absolute; bottom: 0; left: 0; height: 2px; width: 0;
      background: var(--text); border-radius: 2px 2px 0 0; pointer-events: none;
      transition: left .32s cubic-bezier(.4,0,.2,1), width .32s cubic-bezier(.4,0,.2,1);
    }

    .sport-view { display: none; padding-bottom: 110px; }
    .sport-view.active { display: block; }

    /* ── LIVE ROW ── */
    .live-row { display: flex; align-items: center; gap: 8px; padding: 22px 20px 12px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .live-label { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); line-height: 1; }

    /* ── SMOOTH EXPAND ── */
    .card-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .44s cubic-bezier(.4,0,.2,1); }
    .card-wrap.open { grid-template-rows: 1fr; }
    .card-inner { min-height: 0; overflow: hidden; opacity: 0; transition: opacity .3s ease .04s; }
    .card-wrap.open .card-inner { opacity: 1; }

    .game-item { cursor: pointer; }

    /* ── EXPANDED CARD ── */
    .card-expanded { margin: 0 16px 10px; background: var(--card); border-radius: 18px; overflow: hidden; }
    .score-block { display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px 24px; }
    .team-col { display: flex; flex-direction: column; align-items: center; gap: 14px; flex: 1; }
    .team-label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .logo-wrap { width: 82px; height: 82px; display: flex; align-items: center; justify-content: center; }
    .logo-wrap img { width: 82px; height: 82px; object-fit: contain; }
    .score-num { font-size: 62px; font-weight: 900; line-height: 1; letter-spacing: -2px; color: var(--text); }
    .vs-col { display: flex; align-items: center; justify-content: center; padding: 0 6px; margin-top: 148px; }
    .clock-txt { font-size: 12px; font-weight: 700; }
    .q-row { display: grid; padding: 0 20px 20px; }
    .q-cell { font-size: 13px; font-weight: 600; text-align: center; padding: 8px 0; color: var(--muted); }
    .q-cell.head { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 2px; }
    .q-cell.team-id { text-align: left; font-size: 12px; }
    .q-cell.live { color: var(--text); }
    .q-cell.total { color: var(--text); font-size: 15px; font-weight: 900; }
    .q-cell.gone { color: var(--dim); }
    .q-cell.dim-score { color: var(--muted); }
    .upcoming-venue { padding: 0 20px 20px; text-align: center; font-size: 12px; color: var(--muted); letter-spacing: .5px; }

    /* ── COMPACT CARD ── */
    .card-compact { margin: 0 16px 8px; background: var(--card); border-radius: 14px; padding: 14px 16px; }
    .compact-status { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .compact-status.is-live  { color: var(--live); }
    .compact-status.is-final { color: var(--muted); }
    .compact-status.is-soon  { color: var(--accent); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--live); animation: blink 1.4s ease-in-out infinite; }
    .compact-team { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .compact-team + .compact-team { border-top: 1px solid var(--border); }
    .compact-logo { width: 32px; height: 32px; flex-shrink: 0; }
    .compact-logo img { width: 32px; height: 32px; object-fit: contain; }
    .compact-name { flex: 1; font-size: 14px; font-weight: 600; }
    .compact-score { font-size: 18px; font-weight: 900; letter-spacing: -.5px; }
    .compact-score.loser   { color: var(--muted); }
    .compact-score.pending { color: var(--dim); font-size: 14px; font-weight: 600; }

    /* ── SECTION / DATE HEADERS ── */
    .section-head { padding: 20px 20px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); }
    .date-head {
      display: flex; align-items: baseline; gap: 8px;
      padding: 16px 20px 10px;
    }
    .date-head-label { font-size: 14px; font-weight: 800; color: var(--text); }
    .date-head-sub   { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .4px; }

    /* ── NEWS ── */
    .news-item { display: block; margin: 0 16px 8px; background: var(--card); border-radius: 14px; padding: 16px; text-decoration: none; color: inherit; }
    .news-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; flex-wrap: wrap; }
    .news-cat { font-size: 10px; font-weight: 800; letter-spacing: .9px; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; background: var(--border); color: var(--muted); }
    .news-cat.cat-live   { background: rgba(232,65,74,.15);  color: var(--live); }
    .news-cat.cat-trade  { background: rgba(59,130,246,.15); color: var(--accent); }
    .news-cat.cat-injury { background: rgba(251,146,60,.15); color: #fb923c; }
    .news-source { font-size: 11px; color: var(--muted); font-weight: 600; margin-left: auto; white-space: nowrap; }
    .news-headline { font-size: 15px; font-weight: 700; line-height: 1.4; }


    .state-msg { padding: 48px 20px; text-align: center; font-size: 13px; color: var(--muted); }

    /* ── DESKTOP LAYOUT ── */
    @media (min-width: 640px) {
      .sport-view { padding-bottom: 90px; }
      .tabs { padding: 24px 32px 0; }
      .tab { padding: 12px 22px 14px; font-size: 14px; }
      .live-row { padding: 28px 32px 16px; }
      .section-head { padding: 24px 32px 14px; font-size: 12px; }
      .date-head { padding: 18px 32px 12px; }
      .date-head-label { font-size: 16px; }

      /* 2-column card grid */
      .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 32px; }
      .cards-grid .card-compact,
      .cards-grid .card-expanded { margin: 0; }
      /* expanded card spans full width */
      .cards-grid .game-item:has(.expand-wrap.open) { grid-column: 1 / -1; }

      .news-item { margin: 0 32px 10px; padding: 20px; }
      .news-headline { font-size: 16px; }
      .compact-name { font-size: 15px; }
      .compact-score { font-size: 20px; }
      .score-num { font-size: 72px; }
      .logo-wrap, .logo-wrap img { width: 96px; height: 96px; }
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 100%; background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex; padding: 12px 0 20px; z-index: 100;
    }
    @media (min-width: 640px) {
      .bottom-nav { max-width: 900px; }
    }
    .nav-indicator {
      position: absolute; top: 0; left: 0; height: 2px; width: 0;
      background: var(--text); border-radius: 0 0 2px 2px; pointer-events: none;
      transition: left .32s cubic-bezier(.4,0,.2,1), width .32s cubic-bezier(.4,0,.2,1);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex: 1; opacity: .35; transition: opacity .2s; }
    .nav-btn.active { opacity: 1; }
    .nav-btn svg { width: 22px; height: 22px; stroke: var(--text); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .nav-txt { font-size: 10px; font-weight: 600; letter-spacing: .4px; }

    /* ── LOGO HEADER ── */
    .app-header {
      display: flex; align-items: center; gap: 11px;
      padding: 20px 20px 2px;
    }
    .logo-text {
      font-size: 16px; font-weight: 900; letter-spacing: -0.3px; color: var(--text);
    }
    .logo-text span { color: var(--accent); }
    @media (min-width: 640px) {
      .app-header { padding: 28px 32px 4px; }
      .logo-text { font-size: 21px; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo-text">Sports<span>Feed</span></div>
  </header>

  <div id="games-page" class="page active">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('nba',this)">NBA</div>
      <div class="tab" onclick="switchTab('nfl',this)">NFL</div>
      <div class="tab-indicator"></div>
    </div>
    <div id="nba" class="sport-view active"><div class="state-msg">Loading…</div></div>
    <div id="nfl" class="sport-view"><div class="state-msg">Loading…</div></div>
  </div>

  <div id="news-page" class="page">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('nba-news',this)">NBA</div>
      <div class="tab" onclick="switchTab('nfl-news',this)">NFL</div>
      <div class="tab-indicator"></div>
    </div>
    <div id="nba-news" class="sport-view active"><div class="state-msg">Loading…</div></div>
    <div id="nfl-news" class="sport-view"><div class="state-msg">Loading…</div></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-indicator"></div>
    <div class="nav-btn active" onclick="switchPage('games-page',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      <span class="nav-txt">Games</span>
    </div>
    <div class="nav-btn" onclick="switchPage('news-page',this)">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v14a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
      <span class="nav-txt">News</span>
    </div>
  </nav>

<script>
// ── STATE ────────────────────────────────────────────────────────────────
const sel = { nba: null, nfl: null };

// ── INDICATORS ───────────────────────────────────────────────────────────
function placeIndicator(ind, el, parent) {
  const pr = parent.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  ind.style.left  = (er.left - pr.left) + 'px';
  ind.style.width = er.width + 'px';
}
function moveTabIndicator(el) {
  const tabs = el.closest('.tabs');
  const ind  = tabs.querySelector('.tab-indicator');
  if (!ind) return;
  placeIndicator(ind, el, tabs);
}
function moveNavIndicator(el) {
  const nav = el.closest('.bottom-nav');
  const ind = nav.querySelector('.nav-indicator');
  if (!ind) return;
  placeIndicator(ind, el, nav);
}
function initIndicators() {
  // Place instantly — no transition — so first click animates FROM correct position
  document.querySelectorAll('.tabs').forEach(tabs => {
    const ind = tabs.querySelector('.tab-indicator');
    const a   = tabs.querySelector('.tab.active');
    if (!ind || !a) return;
    ind.style.transition = 'none';
    placeIndicator(ind, a, tabs);
    ind.offsetWidth; // force reflow so 'none' takes effect before restoring
    ind.style.transition = '';
  });
  const nav = document.querySelector('.bottom-nav');
  const ind = nav.querySelector('.nav-indicator');
  const a   = nav.querySelector('.nav-btn.active');
  if (ind && a) {
    ind.style.transition = 'none';
    placeIndicator(ind, a, nav);
    ind.offsetWidth;
    ind.style.transition = '';
  }
}

// ── NAV ──────────────────────────────────────────────────────────────────
function switchPage(id, el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
  moveNavIndicator(el);

  // Keep games and news tabs in sync with each other
  const syncFrom = id === 'news-page' ? '#games-page' : '#news-page';
  const syncTo   = id === 'news-page' ? 'news-page'   : 'games-page';
  const activeSrcTab = document.querySelector(syncFrom + ' .tab.active');
  const sport = activeSrcTab && activeSrcTab.textContent.trim().toLowerCase();
  if (sport) {
    const destPage = document.getElementById(syncTo);
    const destTabs = destPage.querySelectorAll('.tab');
    // Freeze tab color transitions so the swap is instant (no flash)
    destTabs.forEach(t => { t.style.transition = 'none'; t.classList.remove('active'); });
    destPage.querySelectorAll('.sport-view').forEach(v => v.classList.remove('active'));
    const matchTab = Array.from(destTabs).find(t => t.textContent.trim().toLowerCase() === sport);
    if (matchTab) matchTab.classList.add('active');
    const viewId = id === 'news-page' ? sport + '-news' : sport;
    const destView = document.getElementById(viewId);
    if (destView) destView.classList.add('active');
    // Restore transitions after the browser paints the new state
    requestAnimationFrame(() => destTabs.forEach(t => { t.style.transition = ''; }));
  }

  // Re-anchor the tab indicator for the now-visible page (was display:none during initIndicators)
  const page = document.getElementById(id);
  const tabs = page && page.querySelector('.tabs');
  const ind  = tabs && tabs.querySelector('.tab-indicator');
  const a    = tabs && tabs.querySelector('.tab.active');
  if (ind && a) {
    ind.style.transition = 'none';
    placeIndicator(ind, a, tabs);
    ind.offsetWidth;
    ind.style.transition = '';
  }
}
function switchTab(id, el) {
  const page = el.closest('.page');
  page.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  page.querySelectorAll('.sport-view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
  moveTabIndicator(el);
}

// ── GAME INTERACTIONS ─────────────────────────────────────────────────────
function selectGame(el) {
  const view = el.closest('.sport-view');
  view.querySelectorAll('.game-item').forEach(item => {
    item.querySelector('.expand-wrap').classList.remove('open');
    item.querySelector('.compact-wrap').classList.add('open');
  });
  el.querySelector('.expand-wrap').classList.add('open');
  el.querySelector('.compact-wrap').classList.remove('open');
  sel[view.id] = el.dataset.eid;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function dateLabel(offset, date) {
  if (offset === 0)  return 'Today';
  if (offset === -1) return 'Yesterday';
  if (offset === 1)  return 'Tomorrow';
  return date.toLocaleDateString('en-US', { weekday: 'long' });
}
function dateSub(date) {
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function timeAgo(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60)    return 'Just now';
  if (s < 3600)  return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// Split text into sentences, return first n joined, or full text
function sentenceSnippet(text, n) {
  if (!text) return '';
  const sentences = text.match(/[^.!?]+(?:[.!?]+|$)/g) || [text];
  return sentences.slice(0, n).join(' ').trim();
}

function newsCategory(article) {
  const cats    = (article.categories || []).map(c => (c.description||'').toLowerCase()).join(' ');
  const hl      = (article.headline||'').toLowerCase();
  const t       = cats + ' ' + hl;
  if (/injur|day-to-day|out for|ruled out|placed on|sidelined/.test(t)) return ['Injury','cat-injury'];
  if (/trade|traded|acquire/.test(t))                                     return ['Trade','cat-trade'];
  if (/sign|extension|contract|deal/.test(t))                             return ['Signing','cat-trade'];
  if (/draft/.test(t))                                                     return ['Draft',''];
  if (/mvp|award|record|named/.test(t))                                   return ['Award',''];
  if (/breaking|report/.test(t))                                           return ['Breaking','cat-live'];
  return ['Report',''];
}

// ── GAME RENDERING ─────────────────────────────────────────────────────────
function buildQRow(L, R, status) {
  const live   = status.type.name === 'STATUS_IN_PROGRESS';
  const final  = status.type.name === 'STATUS_FINAL';
  const period = status.period || 0;
  const ll = L.linescores || [], rl = R.linescores || [];
  const total  = Math.max(ll.length, rl.length, period, 4);
  const cols   = `52px ${Array(total).fill('1fr').join(' ')} 44px`;
  const lbl    = i => i < 4 ? `Q${i+1}` : `OT${i-3}`;

  let hdr = `<div class="q-cell head team-id"></div>`;
  let lR  = `<div class="q-cell team-id">${L.team.abbreviation}</div>`;
  let rR  = `<div class="q-cell team-id">${R.team.abbreviation}</div>`;

  for (let i = 0; i < total; i++) {
    hdr += `<div class="q-cell head">${lbl(i)}</div>`;
    const isCur = live && i === period - 1;
    const isFut = !final && i >= period;
    const cls   = isCur ? 'live' : isFut ? 'gone' : '';
    lR += `<div class="q-cell ${cls}">${isFut ? '—' : (ll[i]?.value ?? '—')}</div>`;
    rR += `<div class="q-cell ${cls}">${isFut ? '—' : (rl[i]?.value ?? '—')}</div>`;
  }

  const lWin = final && parseInt(L.score) > parseInt(R.score);
  const rWin = final && parseInt(R.score) > parseInt(L.score);
  hdr += `<div class="q-cell head">T</div>`;
  lR  += `<div class="q-cell total ${final&&!lWin?'dim-score':''}">${L.score||'—'}</div>`;
  rR  += `<div class="q-cell total ${final&&!rWin?'dim-score':''}">${R.score||'—'}</div>`;

  return `<div class="q-row" style="grid-template-columns:${cols}">${hdr}${lR}${rR}</div>`;
}

function gameCardHTML(event, isExpanded) {
  const comp   = event.competitions[0];
  const status = comp.status;
  const tname  = status.type.name;
  const live   = tname === 'STATUS_IN_PROGRESS';
  const final  = tname === 'STATUS_FINAL';
  const sched  = !live && !final;
  const detail = status.type.shortDetail || '';

  const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[0];
  const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[1];
  const L = away, R = home;

  const statusColor = live ? 'var(--live)' : sched ? 'var(--accent)' : 'var(--muted)';
  const lScore = sched ? '—' : (L.score||'0');
  const rScore = sched ? '—' : (R.score||'0');
  const lDim   = final && parseInt(lScore) < parseInt(rScore);
  const rDim   = final && parseInt(rScore) < parseInt(lScore);

  const venue = comp.venue?.fullName || '';

  const expanded = `
    <div class="card-expanded">
      <div class="score-block">
        <div class="team-col">
          <span class="team-label">${L.team.shortDisplayName||L.team.displayName}</span>
          <div class="logo-wrap"><img src="${L.team.logo}" alt="${L.team.abbreviation}" onerror="this.style.opacity=0"/></div>
          <span class="score-num" style="${lDim?'color:var(--muted)':''}${sched?'font-size:42px;color:var(--dim)':''}">${lScore}</span>
        </div>
        <div class="vs-col">
          <span class="clock-txt" style="color:${statusColor}">${live?(status.displayClock||detail):final?'Final':detail}</span>
        </div>
        <div class="team-col">
          <span class="team-label">${R.team.shortDisplayName||R.team.displayName}</span>
          <div class="logo-wrap"><img src="${R.team.logo}" alt="${R.team.abbreviation}" onerror="this.style.opacity=0"/></div>
          <span class="score-num" style="${rDim?'color:var(--muted)':''}${sched?'font-size:42px;color:var(--dim)':''}">${rScore}</span>
        </div>
      </div>
      ${!sched ? buildQRow(L,R,status) : `<div class="upcoming-venue">${detail}${venue?' · '+venue:''}</div>`}
    </div>`;

  const compStatusCls = live?'is-live':final?'is-final':'is-soon';
  const compact = `
    <div class="card-compact">
      <div class="compact-status ${compStatusCls}">
        ${live?'<span class="status-dot"></span>':''} ${live?detail:final?'Final':detail}
      </div>
      <div class="compact-team">
        <div class="compact-logo"><img src="${L.team.logo}" alt="${L.team.abbreviation}" onerror="this.style.opacity=0"/></div>
        <span class="compact-name">${L.team.shortDisplayName||L.team.displayName}</span>
        <span class="compact-score${lDim?' loser':''}${sched?' pending':''}">${lScore}</span>
      </div>
      <div class="compact-team">
        <div class="compact-logo"><img src="${R.team.logo}" alt="${R.team.abbreviation}" onerror="this.style.opacity=0"/></div>
        <span class="compact-name">${R.team.shortDisplayName||R.team.displayName}</span>
        <span class="compact-score${rDim?' loser':''}${sched?' pending':''}">${rScore}</span>
      </div>
    </div>`;

  return `
    <div class="game-item" data-eid="${event.id}" onclick="selectGame(this)">
      <div class="card-wrap expand-wrap ${isExpanded?'open':''}">
        <div class="card-inner">${expanded}</div>
      </div>
      <div class="card-wrap compact-wrap ${isExpanded?'':'open'}">
        <div class="card-inner">${compact}</div>
      </div>
    </div>`;
}

function renderGamesRange(sport, days) {
  const container = document.getElementById(sport);
  const allEvents = days.flatMap(d => d.events.map(e => ({ ...e, _offset: d.offset, _date: d.date })));

  if (!allEvents.length) {
    container.innerHTML = '<div class="state-msg">No upcoming games</div>';
    return;
  }

  const today  = days.find(d => d.offset === 0)?.events || [];
  const past   = days.filter(d => d.offset < 0 && d.events.length).reverse();
  const future = days.filter(d => d.offset > 0 && d.events.length);

  const hasLive = today.some(e => e.competitions[0].status.type.name === 'STATUS_IN_PROGRESS');

  // Reset sel if the previously selected game no longer exists in the current data
  if (sel[sport] && !allEvents.some(e => e.id === sel[sport])) sel[sport] = null;

  // Pick default selection: first live → first today → first future → first past
  if (!sel[sport]) {
    const live = today.find(e => e.competitions[0].status.type.name === 'STATUS_IN_PROGRESS');
    if (live) sel[sport] = live.id;
    else if (today[0]) sel[sport] = today[0].id;
    else if (future[0]?.events[0]) sel[sport] = future[0].events[0].id;
    else if (past[0]?.events[0]) sel[sport] = past[0].events[0].id;
  }

  let html = '';

  // ── TODAY / LIVE ──
  if (today.length) {
    html += `<div class="live-row"><div class="live-dot"></div><span class="live-label">${hasLive ? 'Live now' : 'Today'}</span></div>`;
    html += `<div class="cards-grid">`;
    today.forEach(e => { html += gameCardHTML(e, e.id === sel[sport]); });
    html += `</div>`;
  }

  // ── UPCOMING ── (only render if there are future games)
  if (future.length) {
    html += `<div class="section-head">Upcoming</div>`;
    future.forEach(day => {
      html += `<div class="date-head"><span class="date-head-label">${dateLabel(day.offset, day.date)}</span><span class="date-head-sub">${dateSub(day.date)}</span></div>`;
      html += `<div class="cards-grid">`;
      day.events.forEach(e => { html += gameCardHTML(e, e.id === sel[sport]); });
      html += `</div>`;
    });
  }

  // ── PREVIOUS ──
  if (past.length) {
    html += `<div class="section-head">Previous Games</div>`;
    past.forEach(day => {
      html += `<div class="date-head"><span class="date-head-label">${dateLabel(day.offset, day.date)}</span><span class="date-head-sub">${dateSub(day.date)}</span></div>`;
      html += `<div class="cards-grid">`;
      day.events.forEach(e => { html += gameCardHTML(e, e.id === sel[sport]); });
      html += `</div>`;
    });
  }

  if (!today.length && !future.length && !past.length) {
    html = '<div class="state-msg">No upcoming games</div>';
  }

  container.innerHTML = html;
}

// ── NEWS RENDERING ─────────────────────────────────────────────────────────
function newsCardHTML(article) {
  const [catLabel, catCls] = newsCategory(article);
  const source   = article.byline || 'ESPN';
  const ago      = timeAgo(article.published);
  const url      = article.links?.web?.href || article.links?.mobile?.href || '#';
  const headline = article.headline || '';

  return `
    <a class="news-item" href="${url}" target="_blank">
      <div class="news-meta">
        <span class="news-cat ${catCls}">${catLabel}</span>
        <span class="news-source">${source} · ${ago} ↗</span>
      </div>
      <div class="news-headline">${headline}</div>
    </a>`;
}

function renderNews(viewId, articles) {
  const container = document.getElementById(viewId);
  if (!articles.length) { container.innerHTML = '<div class="state-msg">No news right now</div>'; return; }
  const sorted = [...articles].sort((a, b) => new Date(b.published) - new Date(a.published));
  let html = `<div class="live-row"><div class="live-dot"></div><span class="live-label">Latest</span></div>`;
  sorted.forEach(a => { html += newsCardHTML(a); });
  container.innerHTML = html;
}

// ── FETCH ──────────────────────────────────────────────────────────────────
function groupEventsByOffset(events, base) {
  const buckets = {};
  for (let o = -3; o <= 2; o++) {
    const d = new Date(base); d.setDate(d.getDate() + o);
    buckets[o] = { offset: o, date: new Date(d), events: [], ok: true };
  }
  events.forEach(ev => {
    // ESPN dates are UTC; parse YYYY-MM-DD from the ISO string to avoid timezone shifts
    const iso   = ev.date || '';
    const ymd   = iso.slice(0, 10); // "2026-06-29"
    const evDay = new Date(ymd + 'T00:00:00'); // local midnight
    const diff  = Math.round((evDay - base) / 86400000);
    if (buckets[diff]) buckets[diff].events.push(ev);
  });
  return Object.values(buckets);
}

async function fetchGamesRange(sport) {
  const league = sport === 'nba' ? 'basketball/nba' : 'football/nfl';
  const base   = new Date(); base.setHours(0,0,0,0);
  const el     = document.getElementById(sport);

  const d0 = new Date(base); d0.setDate(d0.getDate() - 3);
  const d1 = new Date(base); d1.setDate(d1.getDate() + 2);

  // 1) Try ESPN range query (one call for all 5 days)
  try {
    const res  = await fetch(
      `https://site.api.espn.com/apis/site/v2/sports/${league}/scoreboard?dates=${fmtDate(d0)}-${fmtDate(d1)}&limit=50`
    );
    const data = await res.json();
    const events = data.events || [];
    console.log(`[${sport}] range query: ${events.length} events`, events.map(e => `${e.date} ${e.name}`));
    if (events.length) {
      renderGamesRange(sport, groupEventsByOffset(events, base));
      return;
    }
  } catch (err) {
    console.warn(`[${sport}] range query failed:`, err);
  }

  // 2) Fall back to one request per day
  const fetches = [];
  for (let offset = -3; offset <= 2; offset++) {
    const d  = new Date(base); d.setDate(d.getDate() + offset);
    const ds = fmtDate(d);
    fetches.push(
      fetch(`https://site.api.espn.com/apis/site/v2/sports/${league}/scoreboard?dates=${ds}`)
        .then(r => r.json())
        .then(data => {
          console.log(`[${sport}] ${ds}: ${data.events?.length || 0} events`);
          return { offset, date: new Date(d), events: data.events || [], ok: true };
        })
        .catch(err => {
          console.warn(`[${sport}] ${ds} failed:`, err);
          return { offset, date: new Date(d), events: [], ok: false };
        })
    );
  }

  const days        = await Promise.all(fetches);
  const anyOk       = days.some(d => d.ok);
  const totalEvents = days.reduce((s, d) => s + d.events.length, 0);

  if (!anyOk) {
    el.innerHTML = '<div class="state-msg">Could not load — check your connection</div>';
    return;
  }

  if (totalEvents > 0) {
    renderGamesRange(sport, days);
    return;
  }

  // 3) Generic fallback (returns ESPN's current slate regardless of date)
  try {
    const res  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${league}/scoreboard`);
    const data = await res.json();
    console.log(`[${sport}] generic fallback: ${data.events?.length || 0} events`);
    if (data.events?.length) {
      renderGamesRange(sport, groupEventsByOffset(data.events, base));
      return;
    }
  } catch {}

  el.innerHTML = '<div class="state-msg">No upcoming games</div>';
}

async function fetchNews(viewId) {
  const league = viewId.includes('nfl') ? 'football/nfl' : 'basketball/nba';
  try {
    const res  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${league}/news?limit=14`);
    const data = await res.json();
    renderNews(viewId, data.articles || []);
  } catch {
    document.getElementById(viewId).innerHTML = '<div class="state-msg">Could not load news</div>';
  }
}

async function refreshAll() {
  await Promise.all([
    fetchGamesRange('nba'), fetchGamesRange('nfl'),
    fetchNews('nba-news'), fetchNews('nfl-news'),
  ]);
}

// ── INIT ───────────────────────────────────────────────────────────────────
refreshAll();
setInterval(refreshAll, 60000);
requestAnimationFrame(initIndicators);
</script>
